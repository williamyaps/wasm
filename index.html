<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WASM Loader V3 — Decryptor (URL Mode)</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#090d09;color:#4afa7a;font-family:'Courier New',monospace;padding:24px;font-size:14px;display:flex;align-items:center;justify-content:center;min-height:100vh}
.box{width:100%;max-width:550px;background:#0c130c;padding:28px;border:1px solid #1d451d;border-radius:3px;box-shadow:0 10px 30px rgba(0,0,0,0.5)}
h2{font-size:1.05em;color:#7cff9c;margin-bottom:20px;text-align:center;letter-spacing:1px}
label{display:block;margin:14px 0 4px;font-size:.75em;opacity:.55;text-transform:uppercase;letter-spacing:.06em}
input[type=text],input[type=password]{
  width:100%;background:#0a100a;color:#4afa7a;
  border:1px solid #1d451d;padding:12px;
  font-family:inherit;font-size:.9em;outline:none;margin-bottom:10px
}
input:focus{border-color:#4afa7a}
input::placeholder{opacity:.4}
button{
  width:100%;background:#4afa7a;color:#000;padding:12px;
  border:none;cursor:pointer;font-family:inherit;
  font-weight:bold;font-size:.9em;margin-top:10px;border-radius:2px;
  transition: background 0.2s
}
button:hover{background:#7cff9c}
button:disabled{opacity:0.3;cursor:not-allowed}
#status{
  margin-top:20px;padding:10px;font-size:0.8em;
  border-top:1px solid #1d451d;display:none;
  white-space:pre-wrap;line-height:1.5
}
.err{color:#ff5555}.ok{color:#4afa7a}.w{color:#ffc044}
</style>
</head>
<body>

<div class="box" id="mainBox">
  <h2>🔓 WASM DECRYPTOR V3 — URL MODE</h2>
  
  <label>WASM URL (GitHub raw link / any HTTPS)</label>
  <input type="text" id="wasmUrl" placeholder="https://raw.githubusercontent.com/.../file.wasm" value="">

  <label>Password</label>
  <input type="password" id="pwd" placeholder="Masukkan password dekripsi...">

  <button id="btn">🔓 Unlock & Run</button>

  <div id="status"></div>
</div>

<script>
/* ══════════════════════════════════════════════════════
   SHA3-256 Implementation (Must match Packer)
   ══════════════════════════════════════════════════════ */
function sha3_256(data) {
  const RC = [0x0000000000000001n,0x0000000000008082n,0x800000000000808An,0x8000000080008000n,0x000000000000808Bn,0x0000000080000001n,0x8000000080008081n,0x8000000000008009n,0x000000000000008An,0x0000000000000088n,0x0000000080008009n,0x000000008000000An,0x000000008000808Bn,0x800000000000008Bn,0x8000000000008089n,0x8000000000008003n,0x8000000000008002n,0x8000000000000080n,0x000000000000800An,0x800000008000000An,0x8000000080008081n,0x8000000000008080n,0x0000000080000001n,0x8000000080008008n];
  const RHO = [0,1,62,28,27,36,44,6,55,20,3,10,43,25,39,41,45,15,21,8,18,2,61,56,14];
  const M = 0xFFFFFFFFFFFFFFFFn;
  function rot64(v, n) { return ((v << BigInt(n)) | (v >> BigInt(64-n))) & M; }
  function keccakF(A) {
    for (let r = 0; r < 24; r++) {
      const C = new BigUint64Array(5);
      for (let x = 0; x < 5; x++) C[x] = A[x]^A[x+5]^A[x+10]^A[x+15]^A[x+20];
      const D = new BigUint64Array(5);
      for (let x = 0; x < 5; x++) D[x] = C[(x+4)%5] ^ rot64(C[(x+1)%5], 1);
      for (let i = 0; i < 25; i++) A[i] ^= D[i % 5];
      const B = new BigUint64Array(25);
      for (let x = 0; x < 5; x++) for (let y = 0; y < 5; y++) B[y + 5*((2*x + 3*y) % 5)] = rot64(A[x + 5*y], RHO[x + 5*y]);
      for (let y = 0; y < 5; y++) {
        const r5 = 5 * y; const [b0,b1,b2,b3,b4] = [B[r5],B[r5+1],B[r5+2],B[r5+3],B[r5+4]];
        A[r5]=b0^((~b1&M)&b2); A[r5+1]=b1^((~b2&M)&b3); A[r5+2]=b2^((~b3&M)&b4); A[r5+3]=b3^((~b4&M)&b0); A[r5+4]=b4^((~b0&M)&b1);
      }
      A[0] ^= RC[r];
    }
  }
  const RATE = 136;
  const padLen = RATE - (data.length % RATE);
  const msg = new Uint8Array(data.length + padLen);
  msg.set(data); msg[data.length] = 0x06; msg[msg.length - 1] |= 0x80;
  const A = new BigUint64Array(25);
  const dv = new DataView(msg.buffer);
  for (let off = 0; off < msg.length; off += RATE) {
    for (let j = 0; j < 17; j++) A[j] ^= dv.getBigUint64(off + j * 8, true);
    keccakF(A);
  }
  const out = new Uint8Array(32);
  const ov = new DataView(out.buffer);
  for (let i = 0; i < 4; i++) ov.setBigUint64(i * 8, A[i] & M, true);
  return out;
}

/* ══════════════════════════════════════════════════════
   ChaCha20 Implementation (Must match Packer)
   ══════════════════════════════════════════════════════ */
function chacha20(key, nonce, data, ctr = 0) {
  function rotl(v, n) { return (v << n | v >>> (32 - n)) >>> 0; }
  function qr(s, a, b, c, d) {
    s[a]=(s[a]+s[b])>>>0; s[d]=rotl(s[d]^s[a],16);
    s[c]=(s[c]+s[d])>>>0; s[b]=rotl(s[b]^s[c],12);
    s[a]=(s[a]+s[b])>>>0; s[d]=rotl(s[d]^s[a], 8);
    s[c]=(s[c]+s[d])>>>0; s[b]=rotl(s[b]^s[c], 7);
  }
  const kv = new DataView(key.buffer, key.byteOffset);
  const nv = new DataView(nonce.buffer, nonce.byteOffset);
  const out = new Uint8Array(data.length);
  for (let i = 0; i < data.length; i += 64) {
    const s0 = new Uint32Array([0x61707865, 0x3320646e, 0x79622d32, 0x6b206574, kv.getUint32(0,true), kv.getUint32(4,true), kv.getUint32(8,true), kv.getUint32(12,true), kv.getUint32(16,true), kv.getUint32(20,true), kv.getUint32(24,true), kv.getUint32(28,true), (ctr + Math.floor(i / 64)) >>> 0, nv.getUint32(0,true), nv.getUint32(4,true), nv.getUint32(8,true)]);
    const s = new Uint32Array(s0);
    for (let r = 0; r < 10; r++) { qr(s,0,4,8,12); qr(s,1,5,9,13); qr(s,2,6,10,14); qr(s,3,7,11,15); qr(s,0,5,10,15); qr(s,1,6,11,12); qr(s,2,7,8,13); qr(s,3,4,9,14); }
    const ks = new Uint8Array(64); const ksv = new DataView(ks.buffer);
    for (let k = 0; k < 16; k++) ksv.setUint32(k * 4, (s[k] + s0[k]) >>> 0, true);
    const n = Math.min(64, data.length - i);
    for (let j = 0; j < n; j++) out[i + j] = data[i + j] ^ ks[j];
  }
  return out;
}

/* ══════════════════════════════════════════════════════
   Main Logic — Fetch from URL
   ══════════════════════════════════════════════════════ */
const statusEl = document.getElementById('status');
const btn = document.getElementById('btn');

function log(msg, cls='') {
  statusEl.style.display = 'block';
  statusEl.innerHTML += `<div class="${cls}">${msg}</div>`;
}

btn.onclick = async () => {
  const wasmUrl = document.getElementById('wasmUrl').value.trim();
  const pwd = document.getElementById('pwd').value;

  if (!wasmUrl) { alert('Masukkan URL file .wasm!'); return; }
  if (!pwd) { alert('Masukkan password dekripsi!'); return; }

  statusEl.innerHTML = '';
  btn.disabled = true;

  try {
    log('⏳ Fetching WASM from: ' + wasmUrl);
    const wasmResponse = await fetch(wasmUrl);
    if (!wasmResponse.ok) throw new Error(`HTTP ${wasmResponse.status} — Gagal fetch WASM`);
    const wasmBuffer = await wasmResponse.arrayBuffer();
    
    log('✅ WASM fetched, size: ' + wasmBuffer.byteLength + ' bytes', 'ok');
    log('🔧 Instantiating WebAssembly...');
    
    const { instance } = await WebAssembly.instantiate(wasmBuffer);
    
    // 2. Extract Payload from WASM Memory
    const totalLen = instance.exports.len();
    const fullPayload = new Uint8Array(instance.exports.mem.buffer, 0, totalLen);
    
    // Layout: [salt(32)][chachaNonce(12)][aesIV(12)][sha3hash(32)][ciphertext(N)]
    const salt        = fullPayload.slice(0, 32);
    const chachaNonce = fullPayload.slice(32, 44);
    const aesIV       = fullPayload.slice(44, 56);
    const expectedSha3 = fullPayload.slice(56, 88);
    const ciphertext  = fullPayload.slice(88);

    log('🔑 Deriving keys (PBKDF2 600k)...', 'w');
    const enc = new TextEncoder();
    const km = await crypto.subtle.importKey('raw', enc.encode(pwd), 'PBKDF2', false, ['deriveBits']);
    const derived = new Uint8Array(await crypto.subtle.deriveBits(
      { name:'PBKDF2', salt, iterations:600_000, hash:'SHA-512' }, km, 512
    ));
    
    const chachaKey = derived.slice(0, 32);
    const aesKeyRaw = derived.slice(32, 64);

    // 3. Layer 2 Decrypt: AES-GCM
    log('🔓 Decrypting Layer 2 (AES-GCM)...');
    const aesKey = await crypto.subtle.importKey(
      'raw', aesKeyRaw, { name:'AES-GCM', length:256 }, false, ['decrypt']
    );
    
    let intermediate;
    try {
      intermediate = new Uint8Array(await crypto.subtle.decrypt(
        { name:'AES-GCM', iv:aesIV }, aesKey, ciphertext
      ));
    } catch(e) {
      throw new Error("Password salah atau data korup (AES Fail)");
    }

    // 4. Layer 1 Decrypt: ChaCha20
    log('🔓 Decrypting Layer 1 (ChaCha20)...');
    const plaintext = chacha20(chachaKey, chachaNonce, intermediate);

    // 5. Integrity Check: SHA3-256
    log('🛡️ Verifying Integrity (SHA3)...');
    const actualSha3 = sha3_256(plaintext);
    
    if (actualSha3.toString() !== expectedSha3.toString()) {
      throw new Error("Integrity check failed! Data mungkin telah dimodifikasi.");
    }

    log('✅ Success! Rendering HTML...', 'ok');

    // 6. Render hasil dekripsi
    const blob = new Blob([plaintext], { type: 'text/html' });
    const url = URL.createObjectURL(blob);
    window.location.replace(url);

  } catch (e) {
    log('❌ Error: ' + e.message, 'err');
    console.error(e);
  } finally {
    btn.disabled = false;
  }
};
</script>
</body>
</html>
